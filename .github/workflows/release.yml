name: Release Hermes Controller

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package AstrBot plugin
        run: |
          mkdir -p dist
          zip -r dist/astrbot_plugin_hermes_connector.zip . \
            -x ".git/*" -x ".github/*" -x "hub/*" -x "dist/*" -x "*.pyc" -x "__pycache__/*"

      - name: Package Hermes Hub
        run: |
          tar -czf dist/hermes-hub.tar.gz -C hub .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/astrbot_plugin_hermes_connector.zip
            dist/hermes-hub.tar.gz
          generate_release_notes: true
